<nav class="navbar" [class.scrolled]="scrolled">
  <div class="container nav-inner">
    <!-- Real Logo -->
    <a class="logo" (click)="scrollTo('#home')">
      <img src="assets/channelpro-logo.png" alt="ChannelPro" class="logo-img" />
    </a>

    <!-- Desktop Navigation -->
    <ul class="nav-links">
      <li *ngFor="let link of navLinks">
        <a class="nav-link" (click)="scrollTo(link.href)">{{ link.label }}</a>
      </li>
    </ul>

    <!-- CTA Button -->
    <div class="nav-cta">
      <button class="btn btn-primary nav-btn" (click)="scrollTo('#contact')">
        Get Started
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>

    <!-- Mobile Hamburger -->
    <button class="hamburger" [class.open]="menuOpen" (click)="toggleMenu()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="menuOpen">
    <ul class="mobile-nav-links">
      <li *ngFor="let link of navLinks">
        <a class="mobile-nav-link" (click)="scrollTo(link.href)">{{ link.label }}</a>
      </li>
    </ul>
    <button class="btn btn-primary mobile-cta-btn" (click)="scrollTo('#contact')">
      Book Appointment
    </button>
  </div>
</nav>
