<section class="stats-section">
  <div class="stats-bg">
    <div class="stats-orb stats-orb-1"></div>
    <div class="stats-orb stats-orb-2"></div>
  </div>

  <div class="container">
    <div class="stats-header">
      <span class="section-label stats-label">Our Impact</span>
      <h2 class="section-title">Numbers That <span class="gradient-text">Speak for Themselves</span></h2>
    </div>

    <div class="stats-grid">
      <div class="stat-item" *ngFor="let stat of stats; let i = index">
        <div class="stat-icon">{{ stat.icon }}</div>
        <div class="stat-number">
          <span class="stat-value">{{ displayValues[i] }}</span>
          <span class="stat-suffix">{{ stat.suffix }}</span>
        </div>
        <h3 class="stat-label">{{ stat.label }}</h3>
        <p class="stat-desc">{{ stat.description }}</p>
      </div>
    </div>
  </div>
</section>
