<section id="solutions" class="solutions">
  <div class="container">
    <!-- Header -->
    <div class="solutions-header">
      <span class="section-label">Our Solutions</span>
      <h2 class="section-title">
        Everything You Need to<br>
        <span class="gradient-text">Run Your Business</span>
      </h2>
      <p class="section-subtitle">
        A comprehensive suite of hospitality software tools — thoughtfully designed to integrate
        seamlessly and grow with your business.
      </p>
    </div>

    <!-- Solutions Grid -->
    <div class="solutions-grid">
      <div class="solution-card glass-card" *ngFor="let sol of solutions; let i = index">
        <!-- Card glow -->
        <div class="card-glow" [style.background]="sol.color + '18'"></div>

        <!-- Top: Icon + Tag -->
        <div class="card-top">
          <div class="card-icon" [style.background]="sol.color + '18'" [style.border-color]="sol.color + '30'">
            <ng-container [ngSwitch]="sol.icon">
              <!-- Hotel -->
              <svg *ngSwitchCase="'hotel'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              <!-- Accounting -->
              <svg *ngSwitchCase="'accounting'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              <!-- Channel -->
              <svg *ngSwitchCase="'channel'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              <!-- Review -->
              <svg *ngSwitchCase="'review'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              <!-- POS -->
              <svg *ngSwitchCase="'pos'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              <!-- Custom -->
              <svg *ngSwitchDefault width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 19.07l1.41-1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
            </ng-container>
          </div>
          <span class="card-tag" [style.color]="sol.color" [style.background]="sol.color + '14'" [style.border-color]="sol.color + '30'">
            {{ sol.tag }}
          </span>
        </div>

        <!-- Content -->
        <h3 class="card-title">{{ sol.title }}</h3>
        <p class="card-subtitle">{{ sol.subtitle }}</p>
        <p class="card-desc">{{ sol.description }}</p>

        <!-- Features -->
        <ul class="card-features">
          <li *ngFor="let feat of sol.features">
            <span class="feat-dot" [style.background]="sol.color"></span>
            {{ feat }}
          </li>
        </ul>

        <!-- Learn More Link -->
        <a class="card-link" [style.color]="sol.color" (click)="$event.preventDefault()">
          Learn more
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </a>
      </div>
    </div>
  </div>
</section>
